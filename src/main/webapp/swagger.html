<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>Polarion Copilot API - Swagger UI</title>
  <meta http-equiv="Content-Security-Policy"
    content="default-src 'self' 'unsafe-inline' 'unsafe-eval' data:;">
  <link rel="stylesheet" type="text/css" href="/polarion/copilot/resources/lib/swagger-ui/swagger-ui.css" />
</head>

<body>
  <div id="swagger-ui"></div>
  <script src="/polarion/copilot/resources/lib/swagger-ui/swagger-ui-bundle.js"></script>
  <script>
    // Manually defining the minimal OpenAPI spec for our servlet
    const spec = {
      "openapi": "3.0.1",
      "info": {
        "title": "Polarion Copilot API",
        "version": "1.0.0"
      },
      "servers": [
        { "url": "/polarion/copilot/api" }
      ],
      "paths": {
        "/health": {
          "get": {
            "summary": "Health Check",
            "responses": {
              "200": { "description": "OK" }
            }
          }
        },
        "/config/list": {
          "get": {
            "summary": "List Configurations",
            "parameters": [
              {
                "name": "projectId",
                "in": "query",
                "schema": { "type": "string" }
              }
            ],
            "responses": {
              "200": { "description": "List of files" }
            }
          }
        },
        "/config/file/{name}": {
          "get": {
            "summary": "Get File Content",
            "parameters": [
              { "name": "name", "in": "path", "required": true, "schema": { "type": "string" } },
              { "name": "projectId", "in": "query", "schema": { "type": "string" } }
            ],
            "responses": { "200": { "description": "File content" } }
          },
          "put": {
            "summary": "Update File Content",
            "parameters": [
              { "name": "name", "in": "path", "required": true, "schema": { "type": "string" } },
              { "name": "projectId", "in": "query", "schema": { "type": "string" } }
            ],
            "requestBody": {
              "content": { "text/plain": { "schema": { "type": "string" } } }
            },
            "responses": { "200": { "description": "Updated" } }
          },
          "delete": {
            "summary": "Delete File",
            "parameters": [
              { "name": "name", "in": "path", "required": true, "schema": { "type": "string" } },
              { "name": "projectId", "in": "query", "schema": { "type": "string" } }
            ],
            "responses": {
              "200": { "description": "Deleted" },
              "404": { "description": "File not found" }
            }
          }
        },
        "/providers/test": {
          "post": {
            "summary": "Test LLM Provider Connection",
            "requestBody": {
              "content": {
                "application/json": {
                  "schema": {
                    "type": "object",
                    "properties": {
                      "providerId": { "type": "string", "example": "openai" },
                      "apiKey": { "type": "string" },
                      "baseUrl": { "type": "string" },
                      "model": { "type": "string", "example": "gpt-4o-mini" }
                    }
                  }
                }
              }
            },
            "responses": {
              "200": { "description": "OK" },
              "400": { "description": "Failed" }
            }
          }
        },
        "/chat": {
          "post": {
            "summary": "Chat with LLM",
            "requestBody": {
              "content": {
                "application/json": {
                  "schema": {
                    "type": "object",
                    "properties": {
                      "config": {
                        "type": "object",
                        "properties": {
                          "providerId": { "type": "string" },
                          "apiKey": { "type": "string" },
                          "model": { "type": "string" }
                        }
                      },
                      "message": { "type": "string" }
                    }
                  }
                }
              }
            },
            "responses": { "200": { "description": "Response text" } }
          }
        }
      }
    };

    window.onload = () => {
      window.ui = SwaggerUIBundle({
        spec: spec,
        dom_id: '#swagger-ui',
      });
    };
  </script>
</body>

</html>
