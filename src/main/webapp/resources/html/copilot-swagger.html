<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <title>avasis Copilot API - Swagger UI</title>
  <link rel="stylesheet" href="../css/swagger-ui.css" />
  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
    }
    #swagger-ui {
      height: 100%;
    }
  </style>
</head>
<body>
  <div id="swagger-ui"></div>
  <script src="../js/swagger-ui-bundle.js"></script>
  <script src="../js/swagger-ui-standalone-preset.js"></script>
  <script>
    window.onload = function () {
      SwaggerUIBundle({
        url: '../json/copilot-openapi.json',
        dom_id: '#swagger-ui',
        presets: [
          SwaggerUIBundle.presets.apis,
          SwaggerUIBundle.SwaggerUIStandalonePreset
        ],
        layout: 'BaseLayout'
      });
    };
  </script>
</body>
</html>
