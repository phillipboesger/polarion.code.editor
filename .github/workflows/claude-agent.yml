name: Claude Code Agent

on:
  issues:
    types: [labeled]

jobs:
  claude-agent:
    name: Claude Code Agent
    runs-on: ubuntu-latest
    timeout-minutes: 90
    if: github.event.label.name == 'ai-implement'

    permissions:
      contents: write
      pull-requests: write
      issues: write
      packages: read

    steps:
      # ----------------------------------------------------------------
      # 1. Source code
      # ----------------------------------------------------------------
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      # ----------------------------------------------------------------
      # 2. Java + Maven
      # ----------------------------------------------------------------
      - name: Set up Java 21
        uses: actions/setup-java@v5
        with:
          java-version: "21"
          distribution: temurin
          cache: maven
          server-id: github
          server-username: GITHUB_ACTOR
          server-password: PACKAGES_TOKEN

      - name: Pre-download Maven dependencies
        run: mvn --batch-mode dependency:go-offline
        env:
          GITHUB_ACTOR: ${{ github.actor }}
          PACKAGES_TOKEN: ${{ secrets.PACKAGES_TOKEN || secrets.GITHUB_TOKEN }}

      # ----------------------------------------------------------------
      # 3. Node.js + Playwright (agent uses these directly)
      # ----------------------------------------------------------------
      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: tests/ui/package-lock.json

      - name: Install Playwright dependencies
        working-directory: tests/ui
        run: |
          npm ci
          npx playwright install chromium --with-deps

      # ----------------------------------------------------------------
      # 4. Start Polarion Docker (runs in background for the full job)
      # ----------------------------------------------------------------
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.PACKAGES_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Pull Polarion image
        run: docker pull ghcr.io/phillipboesger/polarion-docker:latest

      - name: Create Polarion volumes
        run: |
          docker volume create polarion_repo
          docker volume create polarion_extensions

      - name: Start Polarion container
        run: |
          docker run -d \
            --name polarion \
            --platform linux/amd64 \
            --memory 6g \
            --shm-size=256m \
            -p 80:80 \
            -p 5433:5433 \
            -e JAVA_OPTS="-Xmx3g -Xms1g" \
            -e JDWP_ENABLED=false \
            --volume polarion_repo:/opt/polarion/data/svn \
            --volume polarion_extensions:/opt/polarion/polarion/extensions \
            ghcr.io/phillipboesger/polarion-docker:latest

      - name: Wait for Polarion to be ready
        run: |
          echo "⏳ Phase 1: waiting for Apache on port 80..."
          timeout 120s bash -c 'until nc -z localhost 80; do sleep 2; done'

          echo "⏳ Phase 2: waiting for Polarion started signal (max 900s)..."
          MAX_RETRIES=90
          RETRY_COUNT=0
          docker exec polarion tail -f /var/log/polarion/polarion.log &
          TAIL_PID=$!

          while [ $RETRY_COUNT -lt $MAX_RETRIES ]; do
            if docker exec polarion grep -q "Polarion started:  \[ TIME" /var/log/polarion/polarion.log 2>/dev/null; then
              echo "✅ Polarion ready after ${SECONDS}s"
              kill $TAIL_PID 2>/dev/null || true
              break
            fi
            if [ "$(docker inspect -f '{{.State.Running}}' polarion 2>/dev/null)" != "true" ]; then
              echo "❌ Container crashed"
              kill $TAIL_PID 2>/dev/null || true
              docker logs polarion --tail 100
              exit 1
            fi
            sleep 10
            RETRY_COUNT=$((RETRY_COUNT + 1))
          done

      # ----------------------------------------------------------------
      # 5. Make redeploy.sh available to the agent
      #    Downloads it from polarion-docker repo so the agent can call it
      # ----------------------------------------------------------------
      - name: Fetch redeploy script
        run: |
          mkdir -p /opt/polarion-scripts
          curl -fsSL \
            https://raw.githubusercontent.com/phillipboesger/polarion-docker/main/scripts/redeploy.sh \
            -o /opt/polarion-scripts/redeploy.sh
          chmod +x /opt/polarion-scripts/redeploy.sh

      # ----------------------------------------------------------------
      # 6. Install Claude Code CLI
      # ----------------------------------------------------------------
      - name: Install Claude Code
        run: npm install -g @anthropic-ai/claude-code

      - name: Configure Git
        run: |
          git config --global user.name "Claude Code Agent"
          git config --global user.email "claude-agent@users.noreply.github.com"

      # ----------------------------------------------------------------
      # 7. Notify issue – agent started
      # ----------------------------------------------------------------
      - name: Comment – agent started
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: ${{ github.event.issue.number }},
              body: [
                '🤖 **Claude Code Agent started**',
                '',
                'Polarion is running. I am now implementing this issue, deploying into Polarion, and verifying via Playwright.',
                'I will report back once the pull request is ready.',
              ].join('\n'),
            });

      # ----------------------------------------------------------------
      # 8. Run Claude Code Agent – full autonomous loop
      # ----------------------------------------------------------------
      - name: Run Claude Code Agent
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PACKAGES_TOKEN: ${{ secrets.PACKAGES_TOKEN || secrets.GITHUB_TOKEN }}
          GITHUB_ACTOR: ${{ github.actor }}
          POLARION_URL: "http://localhost"
          POLARION_USER: "admin"
          POLARION_PASS: "admin"
        run: |
          ISSUE_NUMBER="${{ github.event.issue.number }}"
          ISSUE_TITLE="${{ github.event.issue.title }}"

          cat << 'ISSUE_EOF' > /tmp/issue-body.txt
          ${{ github.event.issue.body }}
          ISSUE_EOF

          AGENT_INSTRUCTIONS=$(cat .github/claude-agent-prompt.md)
          ISSUE_BODY=$(cat /tmp/issue-body.txt)

          FULL_PROMPT="${AGENT_INSTRUCTIONS}

          ## Runtime Environment

          A fully running Polarion instance is available at http://localhost (admin/admin).
          Use this to verify your implementation after each deploy.

          ### How to deploy your changes into Polarion

          After building the JAR with \`mvn --batch-mode package -DskipTests\`, run:

          \`\`\`bash
          /opt/polarion-scripts/redeploy.sh . polarion custom docker
          \`\`\`

          This script will:
          1. Find the JAR in target/
          2. Copy it into the running Polarion container
          3. Restart Polarion
          4. Wait until Polarion is healthy again

          After the redeploy completes, Polarion is ready for UI verification.

          ### How to run Playwright UI tests

          \`\`\`bash
          cd tests/ui
          npm run test:ci
          \`\`\`

          Playwright results are in tests/ui/test-results/.
          Read the failures carefully and fix until all tests pass.

          ### Your full implementation loop

          1. Create branch: claude/issue-${ISSUE_NUMBER}-<short-title>
          2. Implement the feature
          3. Run: mvn --batch-mode verify (unit tests must pass)
          4. Run: mvn --batch-mode package -DskipTests
          5. Run: /opt/polarion-scripts/redeploy.sh . polarion custom docker
          6. Run: cd tests/ui && npm run test:ci
          7. If Playwright tests fail: read failures, fix code, go back to step 3
          8. Only open a PR once both unit tests AND Playwright tests are green

          ---

          ## Your current issue (#${ISSUE_NUMBER})

          **Title:** ${ISSUE_TITLE}

          **Description:**
          ${ISSUE_BODY}

          Start implementing now."
          
          echo "$FULL_PROMPT" | claude \
            --model claude-sonnet-4-6 \
            --print \
            --dangerously-skip-permissions

      # ----------------------------------------------------------------
      # 9. Upload Playwright artifacts (always, for debugging)
      # ----------------------------------------------------------------
      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: tests/ui/playwright-report/
          retention-days: 14

      # ----------------------------------------------------------------
      # 10. Notify issue – agent finished
      # ----------------------------------------------------------------
      - name: Comment – agent finished
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const status = '${{ job.status }}';
            const icon = status === 'success' ? '✅' : '❌';
            const runUrl = `https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: ${{ github.event.issue.number }},
              body: [
                `${icon} **Claude Code Agent finished** – Status: \`${status}\``,
                '',
                `📊 [View full run log](${runUrl})`,
                `📁 [Download Playwright report](${runUrl}#artifacts)`,
                '',
                'The pull request should now be open for your review.',
              ].join('\n'),
            });

      # ----------------------------------------------------------------
      # 11. Dump Docker logs on failure
      # ----------------------------------------------------------------
      - name: Dump Polarion logs on failure
        if: failure()
        run: docker logs polarion --tail 200
