# Creates a new versioned GitHub Release (JAR + auto-generated changelog) in two ways:
#
#  1. AUTOMATIC – merge a PR that carries one of these labels:
#       release:major  → breaking changes (X.0.0)
#       release:minor  → new features     (x.Y.0)
#       release:patch  → bug fixes        (x.y.Z)
#
#  2. MANUAL – open Actions → Release → Run workflow and choose a bump type.
#
# PREREQUISITES
# ─────────────
# • Labels: run the "Create Release Labels" workflow once to create the three
#   labels automatically, or create them by hand in Settings → Labels.
#
# • Push access: if main is a protected branch the default GITHUB_TOKEN may not
#   be allowed to push. In that case create a Personal Access Token with
#   "repo" scope and store it as the secret RELEASE_TOKEN.
#
# • Polarion JARs: set the secret PACKAGES_TOKEN to a PAT with "read:packages"
#   permission for the registry that hosts the com.polarion.* artifacts.

name: Release

on:
  pull_request:
    types: [closed]
    branches: [main]
  workflow_dispatch:
    inputs:
      version_type:
        description: "Version bump type"
        required: true
        default: patch
        type: choice
        options: [patch, minor, major]

jobs:
  prepare-release:
    name: Prepare Release Metadata
    if: |
      github.event_name == 'workflow_dispatch' ||
      (
        github.event.pull_request.merged == true &&
        (
          contains(github.event.pull_request.labels.*.name, 'release:major') ||
          contains(github.event.pull_request.labels.*.name, 'release:minor') ||
          contains(github.event.pull_request.labels.*.name, 'release:patch')
        )
      )
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    outputs:
      bump_type: ${{ steps.bump.outputs.type }}
      new_version: ${{ steps.version.outputs.new }}
      new_tag: ${{ steps.version.outputs.tag }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Java 21
        uses: actions/setup-java@v5
        with:
          java-version: "21"
          distribution: temurin
          cache: maven
          server-id: github
          server-username: GITHUB_ACTOR
          server-password: PACKAGES_TOKEN

      - name: Determine version bump type
        id: bump
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "type=${{ inputs.version_type }}" >> "$GITHUB_OUTPUT"
          else
            LABELS="${{ join(github.event.pull_request.labels.*.name, ' ') }}"
            if [[ "$LABELS" == *"release:major"* ]]; then
              echo "type=major" >> "$GITHUB_OUTPUT"
            elif [[ "$LABELS" == *"release:minor"* ]]; then
              echo "type=minor" >> "$GITHUB_OUTPUT"
            else
              echo "type=patch" >> "$GITHUB_OUTPUT"
            fi
          fi

      - name: Compute new version
        id: version
        run: |
          CURRENT=$(mvn help:evaluate -Dexpression=project.version -q -DforceStdout \
            | sed 's/-SNAPSHOT//')
          TYPE="${{ steps.bump.outputs.type }}"
          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"
          case "$TYPE" in
            major) NEW="$((MAJOR + 1)).0.0" ;;
            minor) NEW="${MAJOR}.$((MINOR + 1)).0" ;;
            *)     NEW="${MAJOR}.${MINOR}.$((PATCH + 1))" ;;
          esac
          echo "new=$NEW"    >> "$GITHUB_OUTPUT"
          echo "tag=v${NEW}" >> "$GITHUB_OUTPUT"
        env:
          GITHUB_ACTOR: ${{ github.actor }}
          PACKAGES_TOKEN: ${{ secrets.PACKAGES_TOKEN || secrets.GITHUB_TOKEN }}

  discover-test-shards:
    name: Discover Test Shards
    needs: []
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      matrix: ${{ steps.shards.outputs.matrix }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Build shard matrix
        id: shards
        run: |
          set -euo pipefail

          mapfile -t TEST_FILES < <(find src/test/java -name '*Test.java' | sort)
          if [ "${#TEST_FILES[@]}" -eq 0 ]; then
            echo "No test files found under src/test/java" >&2
            exit 1
          fi

          SHARD_COUNT=4
          declare -a SHARD_TESTS

          for i in "${!TEST_FILES[@]}"; do
            shard_index=$((i % SHARD_COUNT))
            fqcn="${TEST_FILES[$i]#src/test/java/}"
            fqcn="${fqcn%.java}"
            fqcn="${fqcn//\//.}"
            if [ -n "${SHARD_TESTS[$shard_index]:-}" ]; then
              SHARD_TESTS[$shard_index]="${SHARD_TESTS[$shard_index]},${fqcn}"
            else
              SHARD_TESTS[$shard_index]="${fqcn}"
            fi
          done

          matrix='[]'
          for shard_index in "${!SHARD_TESTS[@]}"; do
            shard_num=$((shard_index + 1))
            tests="${SHARD_TESTS[$shard_index]}"
            matrix=$(jq -c \
              --arg shard "$shard_num" \
              --arg tests "$tests" \
              '. + [{"shard": $shard, "tests": $tests}]' <<< "$matrix")
          done

          echo "matrix=${matrix}" >> "$GITHUB_OUTPUT"

  test-shards:
    name: Release Tests (Shard ${{ matrix.shard }})
    needs: [discover-test-shards]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      checks: write
      pull-requests: write
      packages: read
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.discover-test-shards.outputs.matrix) }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Java 21
        uses: actions/setup-java@v5
        with:
          java-version: "21"
          distribution: temurin
          cache: maven
          server-id: github
          server-username: GITHUB_ACTOR
          server-password: PACKAGES_TOKEN

      - name: Run tests in shard
        run: mvn --batch-mode -Dtest="${{ matrix.tests }}" test
        env:
          GITHUB_ACTOR: ${{ github.actor }}
          PACKAGES_TOKEN: ${{ secrets.PACKAGES_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Generate HTML test report
        if: always()
        run: mvn --batch-mode surefire-report:report-only
        env:
          GITHUB_ACTOR: ${{ github.actor }}
          PACKAGES_TOKEN: ${{ secrets.PACKAGES_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Upload HTML test report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: unit-test-report-shard-${{ matrix.shard }}
          path: target/site/
          if-no-files-found: warn
          retention-days: 30

  ui-tests:
    name: Playwright UI Tests (Release Gate)
    needs: []
    runs-on: ubuntu-latest
    timeout-minutes: 55

    permissions:
      contents: read
      packages: read
      checks: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Java 21
        uses: actions/setup-java@v5
        with:
          java-version: "21"
          distribution: temurin
          cache: maven
          server-id: github
          server-username: GITHUB_ACTOR
          server-password: PACKAGES_TOKEN

      - name: Build plugin JAR
        run: mvn --batch-mode package -DskipTests
        env:
          GITHUB_ACTOR: ${{ github.actor }}
          PACKAGES_TOKEN: ${{ secrets.PACKAGES_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Create Polarion Docker volumes
        run: |
          docker volume create polarion_repo
          docker volume create polarion_extensions

      - name: Deploy plugin JAR into extensions volume
        run: |
          JAR_NAME=$(ls target/*.jar | head -1 | xargs basename)
          echo "Deploying: $JAR_NAME"
          docker run --rm \
            -v polarion_extensions:/ext \
            -v "$(pwd)/target:/src" \
            alpine sh -c "mkdir -p /ext/custom/eclipse/plugins && cp /src/${JAR_NAME} /ext/custom/eclipse/plugins/"

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.PACKAGES_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Pull Polarion image
        run: docker pull ghcr.io/phillipboesger/polarion-docker:latest

      - name: Start Polarion container
        run: |
          docker run -d \
            --name polarion \
            --platform linux/amd64 \
            --memory 6g \
            --shm-size=256m \
            -p 80:80 \
            -p 5433:5433 \
            -p 5005:5005 \
            -e JAVA_OPTS="-Xmx3g -Xms1g" \
            -e JDWP_ENABLED=false \
            --volume polarion_repo:/opt/polarion/data/svn \
            --volume polarion_extensions:/opt/polarion/polarion/extensions \
            ghcr.io/phillipboesger/polarion-docker:latest

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: tests/ui/package-lock.json

      - name: Install npm dependencies
        working-directory: tests/ui
        run: npm ci

      - name: Install Playwright Chromium browser
        working-directory: tests/ui
        run: npx playwright install chromium --with-deps

      - name: Wait for Polarion to become ready
        run: |
          echo "⏳ Phase 1: waiting for Apache on port 80..."
          timeout 120s bash -c 'until nc -z localhost 80; do sleep 2; done'
          echo "  ✅ Apache is up after ${SECONDS}s"

          echo "⏳ Phase 2: waiting for 'Polarion started' in container log (max 900s)..."
          MAX_RETRIES=90
          RETRY_COUNT=0
          SUCCESS=false

          docker exec polarion tail -f /var/log/polarion/polarion.log &
          TAIL_PID=$!

          while [ $RETRY_COUNT -lt $MAX_RETRIES ]; do
            if docker exec polarion grep -q "Polarion started:  \[ TIME" /var/log/polarion/polarion.log 2>/dev/null; then
              echo ""
              echo "✅ Polarion started successfully after ${SECONDS}s"
              SUCCESS=true
              break
            fi

            if docker exec polarion grep -E "Unrecognized VM option|Could not create the Java Virtual Machine" /var/log/polarion/polarion.log 2>/dev/null | grep -q "."; then
              echo "❌ FATAL JVM error detected"
              kill $TAIL_PID 2>/dev/null || true
              docker logs polarion --tail 50
              exit 1
            fi

            if [ "$(docker inspect -f '{{.State.Running}}' polarion 2>/dev/null)" != "true" ]; then
              echo "❌ Container crashed!"
              kill $TAIL_PID 2>/dev/null || true
              docker logs polarion --tail 100
              exit 1
            fi

            echo -n "."
            sleep 10
            RETRY_COUNT=$((RETRY_COUNT + 1))
          done

          kill $TAIL_PID 2>/dev/null || true

          if [ "$SUCCESS" = "false" ]; then
            echo "❌ Timed out waiting for Polarion to start"
            docker logs polarion --tail 200
            exit 1
          fi

      - name: Run Playwright UI tests
        working-directory: tests/ui
        env:
          POLARION_URL: "http://localhost"
          POLARION_USER: "admin"
          POLARION_PASS: "admin"
        run: npm run test:ci

      - name: Upload Playwright HTML report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: release-playwright-report
          path: tests/ui/playwright-report/
          retention-days: 30

      - name: Dump Polarion container logs on failure
        if: failure()
        run: docker logs polarion --tail 200

  build-and-release:
    name: Build And Publish Release
    needs: [prepare-release, test-shards, ui-tests]
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: read

    steps:
      - name: Checkout (full history)
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.RELEASE_TOKEN != '' && secrets.RELEASE_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Set up Java 21
        uses: actions/setup-java@v5
        with:
          java-version: "21"
          distribution: temurin
          cache: maven
          server-id: github
          server-username: GITHUB_ACTOR
          server-password: PACKAGES_TOKEN

      - name: Update version in pom.xml
        run: |
          NEW="${{ needs.prepare-release.outputs.new_version }}"
          mvn --batch-mode versions:set -DnewVersion="${NEW}" -DgenerateBackupPoms=false
          sed -i \
            "s|<manifest.version>.*</manifest.version>|<manifest.version>${NEW}</manifest.version>|" \
            pom.xml
        env:
          GITHUB_ACTOR: ${{ github.actor }}
          PACKAGES_TOKEN: ${{ secrets.PACKAGES_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Build release artifact (tests already passed)
        run: mvn --batch-mode -DskipTests package
        env:
          GITHUB_ACTOR: ${{ github.actor }}
          PACKAGES_TOKEN: ${{ secrets.PACKAGES_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Generate changelog
        id: changelog
        run: |
          NEW_TAG="${{ needs.prepare-release.outputs.new_tag }}"
          LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          RANGE="${LAST_TAG:+${LAST_TAG}..}HEAD"

          FEATURES="" FIXES="" OTHERS=""

          while IFS=$'\t' read -r hash subject; do
            SHORT="${hash:0:7}"
            LINK="[\`${SHORT}\`](https://github.com/${{ github.repository }}/commit/${hash})"
            case "$subject" in
              feat*|feature*|add*|neue*|hinzu*|implement*)
                FEATURES="${FEATURES}\n- ${subject} ${LINK}" ;;
              fix*|bug*|patch*|hotfix*|behoben*|revert*)
                FIXES="${FIXES}\n- ${subject} ${LINK}" ;;
              *)
                OTHERS="${OTHERS}\n- ${subject} ${LINK}" ;;
            esac
          done < <(git log ${RANGE} --no-merges --pretty=format:"%H%x09%s")

          BODY="## What's new in ${NEW_TAG}\n\n"
          [ -n "$FEATURES" ] && BODY="${BODY}### New Features\n${FEATURES}\n\n"
          [ -n "$FIXES" ]    && BODY="${BODY}### Bug Fixes\n${FIXES}\n\n"
          [ -n "$OTHERS" ]   && BODY="${BODY}### Other Changes\n${OTHERS}\n\n"

          if [ -n "$LAST_TAG" ]; then
            CMP="https://github.com/${{ github.repository }}/compare/${LAST_TAG}...${NEW_TAG}"
            BODY="${BODY}**Full Changelog**: ${CMP}"
          else
            BODY="${BODY}**Full Changelog**: https://github.com/${{ github.repository }}/commits/${NEW_TAG}"
          fi

          {
            echo "body<<EOF"
            printf '%b\n' "$BODY"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Commit version bump and push tag
        run: |
          TAG="${{ needs.prepare-release.outputs.new_tag }}"
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add pom.xml
          git commit -m "chore: release ${TAG} [skip ci]"
          git tag "${TAG}"
          git push origin HEAD:main
          git push origin "${TAG}"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ needs.prepare-release.outputs.new_tag }}
          name: "Release ${{ needs.prepare-release.outputs.new_tag }}"
          body: ${{ steps.changelog.outputs.body }}
          files: target/*.jar
          draft: false
          prerelease: false

      - name: Create release on download repository
        env:
          GH_TOKEN: ${{ secrets.RELEASE_TOKEN || secrets.GITHUB_TOKEN }}
          RELEASE_BODY: ${{ steps.changelog.outputs.body }}
        run: |
          TAG="${{ needs.prepare-release.outputs.new_tag }}"
          gh release create "${TAG}" \
            --repo phillipboesger/polarion.code.editor-download \
            --title "Release ${TAG}" \
            --notes "${RELEASE_BODY}" \
            target/*.jar
