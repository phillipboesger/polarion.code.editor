# Creates a new versioned GitHub Release (JAR + auto-generated changelog) in two ways:
#
#  1. AUTOMATIC – merge a PR that carries one of these labels:
#       release:major  → breaking changes (X.0.0)
#       release:minor  → new features     (x.Y.0)
#       release:patch  → bug fixes        (x.y.Z)
#
#  2. MANUAL – open Actions → Release → Run workflow and choose a bump type.
#
# PREREQUISITES
# ─────────────
# • Labels: run the "Create Release Labels" workflow once to create the three
#   labels automatically, or create them by hand in Settings → Labels.
#
# • Push access: if main is a protected branch the default GITHUB_TOKEN may not
#   be allowed to push. In that case create a Personal Access Token with
#   "repo" scope and store it as the secret RELEASE_TOKEN.
#
# • Polarion JARs: set the secret PACKAGES_TOKEN to a PAT with "read:packages"
#   permission for the registry that hosts the com.polarion.* artifacts.

name: Release

on:
  pull_request:
    types: [closed]
    branches: [main]
  workflow_dispatch:
    inputs:
      version_type:
        description: "Version bump type"
        required: true
        default: patch
        type: choice
        options: [patch, minor, major]

jobs:
  release:
    name: Create Release
    # PR path: only when the PR was actually merged AND carries a release label.
    # Manual path: always run.
    if: |
      github.event_name == 'workflow_dispatch' ||
      (
        github.event.pull_request.merged == true &&
        (
          contains(github.event.pull_request.labels.*.name, 'release:major') ||
          contains(github.event.pull_request.labels.*.name, 'release:minor') ||
          contains(github.event.pull_request.labels.*.name, 'release:patch')
        )
      )
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: read

    steps:
      # ── 1. Checkout with full history so we can compare tags ──────────────
      - name: Checkout (full history)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          # RELEASE_TOKEN (PAT) is needed when main is branch-protected;
          # falls back to the built-in GITHUB_TOKEN otherwise.
          token: ${{ secrets.RELEASE_TOKEN != '' && secrets.RELEASE_TOKEN || secrets.GITHUB_TOKEN }}

      # ── 2. Java + Maven cache ─────────────────────────────────────────────
      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: temurin
          cache: maven
          server-id: github
          server-username: GITHUB_ACTOR
          server-password: PACKAGES_TOKEN

      # ── 3. Determine bump type ────────────────────────────────────────────
      - name: Determine version bump type
        id: bump
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "type=${{ inputs.version_type }}" >> "$GITHUB_OUTPUT"
          else
            LABELS="${{ join(github.event.pull_request.labels.*.name, ' ') }}"
            if [[ "$LABELS" == *"release:major"* ]]; then
              echo "type=major" >> "$GITHUB_OUTPUT"
            elif [[ "$LABELS" == *"release:minor"* ]]; then
              echo "type=minor" >> "$GITHUB_OUTPUT"
            else
              echo "type=patch" >> "$GITHUB_OUTPUT"
            fi
          fi

      # ── 4. Compute the next semantic version ─────────────────────────────
      - name: Compute new version
        id: version
        run: |
          CURRENT=$(mvn help:evaluate -Dexpression=project.version -q -DforceStdout \
            | sed 's/-SNAPSHOT//')
          TYPE="${{ steps.bump.outputs.type }}"
          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"
          case "$TYPE" in
            major) NEW="$((MAJOR + 1)).0.0" ;;
            minor) NEW="${MAJOR}.$((MINOR + 1)).0" ;;
            *)     NEW="${MAJOR}.${MINOR}.$((PATCH + 1))" ;;
          esac
          echo "current=$CURRENT" >> "$GITHUB_OUTPUT"
          echo "new=$NEW"         >> "$GITHUB_OUTPUT"
          echo "tag=v${NEW}"      >> "$GITHUB_OUTPUT"
        env:
          GITHUB_ACTOR: ${{ github.actor }}
          PACKAGES_TOKEN: ${{ secrets.PACKAGES_TOKEN || secrets.GITHUB_TOKEN }}

      # ── 5. Write new version into pom.xml ────────────────────────────────
      - name: Update version in pom.xml
        run: |
          NEW="${{ steps.version.outputs.new }}"
          # Update the Maven project <version> (removes -SNAPSHOT, sets release)
          mvn --batch-mode versions:set -DnewVersion="${NEW}" -DgenerateBackupPoms=false
          # Keep the OSGi Bundle-Version (manifest.version property) in sync
          sed -i \
            "s|<manifest.version>.*</manifest.version>|<manifest.version>${NEW}</manifest.version>|" \
            pom.xml
        env:
          GITHUB_ACTOR: ${{ github.actor }}
          PACKAGES_TOKEN: ${{ secrets.PACKAGES_TOKEN || secrets.GITHUB_TOKEN }}

      # ── 6. Build & test (validates the new version compiles correctly) ────
      - name: Build & run tests
        run: mvn --batch-mode verify
        env:
          GITHUB_ACTOR: ${{ github.actor }}
          PACKAGES_TOKEN: ${{ secrets.PACKAGES_TOKEN || secrets.GITHUB_TOKEN }}

      # ── 7. Generate a human-readable, categorised changelog ──────────────
      - name: Generate changelog
        id: changelog
        run: |
          NEW_TAG="${{ steps.version.outputs.tag }}"
          LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          RANGE="${LAST_TAG:+${LAST_TAG}..}HEAD"

          FEATURES="" FIXES="" OTHERS=""

          while IFS=$'\t' read -r hash subject; do
            SHORT="${hash:0:7}"
            LINK="[\`${SHORT}\`](https://github.com/${{ github.repository }}/commit/${hash})"
            case "$subject" in
              feat*|feature*|add*|neue*|hinzu*|implement*)
                FEATURES="${FEATURES}\n- ${subject} ${LINK}" ;;
              fix*|bug*|patch*|hotfix*|behoben*|revert*)
                FIXES="${FIXES}\n- ${subject} ${LINK}" ;;
              *)
                OTHERS="${OTHERS}\n- ${subject} ${LINK}" ;;
            esac
          done < <(git log ${RANGE} --no-merges --pretty=format:"%H%x09%s")

          BODY="## 📦 What's new in ${NEW_TAG}\n\n"
          [ -n "$FEATURES" ] && BODY="${BODY}### ✨ New Features\n${FEATURES}\n\n"
          [ -n "$FIXES" ]    && BODY="${BODY}### 🐛 Bug Fixes\n${FIXES}\n\n"
          [ -n "$OTHERS" ]   && BODY="${BODY}### 🔧 Other Changes\n${OTHERS}\n\n"

          if [ -n "$LAST_TAG" ]; then
            CMP="https://github.com/${{ github.repository }}/compare/${LAST_TAG}...${NEW_TAG}"
            BODY="${BODY}**Full Changelog**: ${CMP}"
          else
            BODY="${BODY}**Full Changelog**: https://github.com/${{ github.repository }}/commits/${NEW_TAG}"
          fi

          {
            echo "body<<EOF"
            printf '%b\n' "$BODY"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      # ── 8. Commit the version bump and push the new tag ──────────────────
      - name: Commit version bump & push tag
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add pom.xml
          git commit -m "chore: release ${{ steps.version.outputs.tag }} [skip ci]"
          git tag "${{ steps.version.outputs.tag }}"
          git push origin HEAD:main
          git push origin "${{ steps.version.outputs.tag }}"

      # ── 9. Publish the GitHub Release with the JAR as an attachment ───────
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: "Release ${{ steps.version.outputs.tag }}"
          body: ${{ steps.changelog.outputs.body }}
          files: target/*.jar
          draft: false
          prerelease: false
