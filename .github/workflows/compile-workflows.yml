# Compiles every GitHub Agentic Workflow (.md) in this directory into its
# corresponding .lock.yml using the gh-aw CLI extension.
#
# Run this workflow whenever a .md source file changes, or manually, to keep
# the compiled .lock.yml files up to date.
#
# PREREQUISITE: The repository must allow GitHub Actions to create and approve
#   pull requests (Settings → Actions → Workflow permissions → enable
#   "Allow GitHub Actions to create and approve pull requests").

name: Compile Agentic Workflows

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

on:
  push:
    paths:
      - .github/workflows/*.md
  pull_request:
    paths:
      - .github/workflows/*.md
  workflow_dispatch:

jobs:
  compile:
    name: Compile .md → .lock.yml
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install gh-aw extension
        run: gh extension install github/gh-aw
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Compile agentic workflows
        run: gh aw compile --workflows-dir .github/workflows --verbose
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Check for generated changes
        id: diff
        run: |
          if git diff --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit compiled lock files
        if: steps.diff.outputs.changed == 'true' && github.event_name == 'push'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .github/workflows/*.lock.yml
          git commit -m "chore: recompile agentic workflow lock files [skip ci]"
          git push
