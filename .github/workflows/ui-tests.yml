# Spins up the Polarion Docker container, deploys the built plugin JAR,
# waits for Polarion to be healthy, and runs all Playwright UI tests.
#
# Prerequisites / Secrets:
#   PACKAGES_TOKEN – PAT with read:packages (same as used in ci.yml)
#   GITHUB_TOKEN   – automatically injected by GitHub Actions
#
# The Polarion image is pulled from:
#   ghcr.io/phillipboesger/polarion-docker:latest

name: UI Tests – Playwright

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

jobs:
  ui-tests:
    name: Playwright UI Tests (Polarion)
    runs-on: ubuntu-latest
    timeout-minutes: 55

    permissions:
      contents: read
      packages: read

    steps:
      # ------------------------------------------------------------------
      # 1. Source code
      # ------------------------------------------------------------------
      - name: Checkout
        uses: actions/checkout@v4

      # ------------------------------------------------------------------
      # 2. Build the plugin JAR (skip unit tests – handled by ci.yml)
      # ------------------------------------------------------------------
      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: temurin
          cache: maven
          server-id: github
          server-username: GITHUB_ACTOR
          server-password: PACKAGES_TOKEN

      - name: Build plugin JAR
        run: mvn --batch-mode package -DskipTests
        env:
          GITHUB_ACTOR: ${{ github.actor }}
          PACKAGES_TOKEN: ${{ secrets.PACKAGES_TOKEN || secrets.GITHUB_TOKEN }}

      # ------------------------------------------------------------------
      # 3. Pre-populate the Polarion extensions volume with the plugin JAR
      #    Deploy path: /opt/polarion/polarion/extensions/custom/eclipse/plugins/
      # ------------------------------------------------------------------
      - name: Create Polarion Docker volumes
        run: |
          docker volume create polarion_repo
          docker volume create polarion_extensions

      - name: Deploy plugin JAR into extensions volume
        run: |
          JAR_NAME=$(ls target/*.jar | head -1 | xargs basename)
          echo "Deploying: $JAR_NAME"
          docker run --rm \
            -v polarion_extensions:/ext \
            -v "$(pwd)/target:/src" \
            alpine sh -c "mkdir -p /ext/custom/eclipse/plugins && cp /src/${JAR_NAME} /ext/custom/eclipse/plugins/"

      # ------------------------------------------------------------------
      # 4. Start the Polarion container
      # ------------------------------------------------------------------
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.PACKAGES_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Pull Polarion image
        run: docker pull ghcr.io/phillipboesger/polarion-docker:latest

      - name: Start Polarion container
        run: |
          # GitHub Actions ubuntu-latest has ~7 GB RAM.
          # Reduce JVM heap so there is headroom for Chromium (~500 MB) and Node.js.
          # --shm-size=256m avoids /dev/shm exhaustion inside the container.
          docker run -d \
            --name polarion \
            --platform linux/amd64 \
            --memory 6g \
            --shm-size=256m \
            -p 80:80 \
            -p 5433:5433 \
            -p 5005:5005 \
            -e JAVA_OPTS="-Xmx3g -Xms1g" \
            -e JDWP_ENABLED=false \
            --volume polarion_repo:/opt/polarion/data/svn \
            --volume polarion_extensions:/opt/polarion/polarion/extensions \
            ghcr.io/phillipboesger/polarion-docker:latest

      # ------------------------------------------------------------------
      # 5. Install Node.js & Playwright
      #    (done before the wait step so Playwright can be used as the
      #     readiness probe – the same approach as the polarion-docker repo)
      # ------------------------------------------------------------------
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: tests/ui/package-lock.json

      - name: Install npm dependencies
        working-directory: tests/ui
        run: npm ci

      - name: Install Playwright Chromium browser
        working-directory: tests/ui
        run: npx playwright install chromium --with-deps

      # ------------------------------------------------------------------
      # 6. Wait for Polarion to be ready
      #
      # Mirrors the polarion-docker repo's own startup check:
      #
      # Phase 1 – Apache: nc until port 80 accepts connections.
      #
      # Phase 2 – Polarion log: poll the container log for the line
      #   "Polarion started:  [ TIME ... ]" which only appears once the
      #   entire OSGi/HiveMind stack (including all plugin contributions)
      #   has been fully initialised. This is the same grep used in the
      #   polarion-docker build-and-push.yml workflow.
      #   On GitHub Actions ubuntu-latest this takes 10–13 min.
      #   Timeout: 900 s (15 min).
      # ------------------------------------------------------------------
      - name: Wait for Polarion to become ready
        run: |
          echo "⏳ Phase 1: waiting for Apache on port 80..."
          timeout 120s bash -c 'until nc -z localhost 80; do sleep 2; done'
          echo "  ✅ Apache is up after ${SECONDS}s"

          echo "⏳ Phase 2: waiting for 'Polarion started' in container log (max 900s)..."
          MAX_RETRIES=90  # 90 × 10 s = 15 min
          RETRY_COUNT=0
          SUCCESS=false

          # Stream the log live so CI output is not silent
          docker exec polarion tail -f /var/log/polarion/polarion.log &
          TAIL_PID=$!

          while [ $RETRY_COUNT -lt $MAX_RETRIES ]; do
            if docker exec polarion grep -q "Polarion started:  \[ TIME" /var/log/polarion/polarion.log 2>/dev/null; then
              echo ""
              echo "✅ Polarion started successfully after ${SECONDS}s"
              SUCCESS=true
              break
            fi

            # Fail fast on fatal JVM/OSGi errors
            if docker exec polarion grep -E "Unrecognized VM option|Could not create the Java Virtual Machine" /var/log/polarion/polarion.log 2>/dev/null | grep -q "."; then
              echo "❌ FATAL JVM error detected"
              kill $TAIL_PID 2>/dev/null || true
              docker logs polarion --tail 50
              exit 1
            fi

            if [ "$(docker inspect -f '{{.State.Running}}' polarion 2>/dev/null)" != "true" ]; then
              echo "❌ Container crashed!"
              kill $TAIL_PID 2>/dev/null || true
              docker logs polarion --tail 100
              exit 1
            fi

            echo -n "."
            sleep 10
            RETRY_COUNT=$((RETRY_COUNT + 1))
          done

          kill $TAIL_PID 2>/dev/null || true

          if [ "$SUCCESS" = "false" ]; then
            echo "❌ Timed out waiting for Polarion to start"
            docker logs polarion --tail 200
            exit 1
          fi

      # ------------------------------------------------------------------
      # 7. Run Playwright tests
      # ------------------------------------------------------------------
      - name: Run Playwright UI tests
        working-directory: tests/ui
        env:
          POLARION_URL: "http://localhost"
          POLARION_USER: "admin"
          POLARION_PASS: "admin"
        run: npm run test:fast

      # ------------------------------------------------------------------
      # 8. Upload artefacts on failure
      # ------------------------------------------------------------------
      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: tests/ui/playwright-report/
          retention-days: 14

      # ------------------------------------------------------------------
      # 9. Dump Docker logs on failure for debugging
      # ------------------------------------------------------------------
      - name: Dump Polarion container logs on failure
        if: failure()
        run: docker logs polarion --tail 200
