# Spins up the Polarion Docker container, deploys the built plugin JAR,
# waits for Polarion to be healthy, and runs all Playwright UI tests.
#
# Prerequisites / Secrets:
#   PACKAGES_TOKEN – PAT with read:packages (same as used in ci.yml)
#   GITHUB_TOKEN   – automatically injected by GitHub Actions
#
# The Polarion image is pulled from:
#   ghcr.io/phillipboesger/polarion-docker:latest

name: UI Tests – Playwright

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

jobs:
  ui-tests:
    name: Playwright UI Tests (Polarion)
    runs-on: ubuntu-latest
    timeout-minutes: 55

    permissions:
      contents: read
      packages: read

    steps:
      # ------------------------------------------------------------------
      # 1. Source code
      # ------------------------------------------------------------------
      - name: Checkout
        uses: actions/checkout@v4

      # ------------------------------------------------------------------
      # 2. Build the plugin JAR (skip unit tests – handled by ci.yml)
      # ------------------------------------------------------------------
      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: temurin
          cache: maven
          server-id: github
          server-username: GITHUB_ACTOR
          server-password: PACKAGES_TOKEN

      - name: Build plugin JAR
        run: mvn --batch-mode package -DskipTests
        env:
          GITHUB_ACTOR: ${{ github.actor }}
          PACKAGES_TOKEN: ${{ secrets.PACKAGES_TOKEN || secrets.GITHUB_TOKEN }}

      # ------------------------------------------------------------------
      # 3. Pre-populate the Polarion extensions volume with the plugin JAR
      #    Deploy path: /opt/polarion/polarion/extensions/custom/eclipse/plugins/
      # ------------------------------------------------------------------
      - name: Create Polarion Docker volumes
        run: |
          docker volume create polarion_repo
          docker volume create polarion_extensions

      - name: Deploy plugin JAR into extensions volume
        run: |
          JAR_NAME=$(ls target/*.jar | head -1 | xargs basename)
          echo "Deploying: $JAR_NAME"
          docker run --rm \
            -v polarion_extensions:/ext \
            -v "$(pwd)/target:/src" \
            alpine sh -c "mkdir -p /ext/custom/eclipse/plugins && cp /src/${JAR_NAME} /ext/custom/eclipse/plugins/"

      # ------------------------------------------------------------------
      # 4. Start the Polarion container
      # ------------------------------------------------------------------
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.PACKAGES_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Pull Polarion image
        run: docker pull ghcr.io/phillipboesger/polarion-docker:latest

      - name: Start Polarion container
        run: |
          # GitHub Actions ubuntu-latest has ~7 GB RAM.
          # Reduce JVM heap so there is headroom for Chromium (~500 MB) and Node.js.
          # --shm-size=256m avoids /dev/shm exhaustion inside the container.
          docker run -d \
            --name polarion \
            --platform linux/amd64 \
            --memory 6g \
            --shm-size=256m \
            -p 80:80 \
            -p 5433:5433 \
            -p 5005:5005 \
            -e JAVA_OPTS="-Xmx3g -Xms1g" \
            -e JDWP_ENABLED=false \
            --volume polarion_repo:/opt/polarion/data/svn \
            --volume polarion_extensions:/opt/polarion/polarion/extensions \
            ghcr.io/phillipboesger/polarion-docker:latest

      # ------------------------------------------------------------------
      # 5. Install Node.js & Playwright
      #    (done before the wait step so Playwright can be used as the
      #     readiness probe – the same approach as the polarion-docker repo)
      # ------------------------------------------------------------------
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: tests/ui/package-lock.json

      - name: Install npm dependencies
        working-directory: tests/ui
        run: npm ci

      - name: Install Playwright Chromium browser
        working-directory: tests/ui
        run: npx playwright install chromium --with-deps

      # ------------------------------------------------------------------
      # 6. Wait for Polarion to be ready
      #
      # Phase 1 – TCP: quick /dev/tcp check to confirm Apache is up.
      #
      # Phase 2 – Playwright smoke login: launch a real Chromium browser,
      #   navigate to /polarion, wait for the login form to appear, log in,
      #   and verify we land on the dashboard (login form gone). Only then
      #   does Polarion's full OSGi/HiveMind stack (including plugin
      #   contributions) exist. This mirrors the polarion-docker repo's own
      #   smoke-test pattern and is immune to curl CSRF-token complexity.
      #
      #   On GitHub Actions ubuntu-latest this takes 10–13 min total.
      #   TIMEOUT controls both phases (900 s = 15 min).
      # ------------------------------------------------------------------
      - name: Wait for Polarion to become ready
        working-directory: tests/ui
        env:
          POLARION_URL: "http://localhost"
          POLARION_USER: "admin"
          POLARION_PASS: "admin"
        run: |
          HOST=127.0.0.1
          PORT=80
          TIMEOUT=900
          POLL=5

          # ── Phase 1: TCP – wait for Apache ──────────────────────────
          polarion_read_http_status() {
            local st=""
            exec 3<>"/dev/tcp/${HOST}/${PORT}" 2>/dev/null || return 1
            printf 'GET /polarion/ HTTP/1.1\r\nHost: localhost\r\nConnection: close\r\n\r\n' >&3
            IFS=$'\r' read -r st <&3 || true
            exec 3<&- ; exec 3>&-
            [ -n "${st}" ] || return 1
            printf '%s\n' "${st}"
          }

          polarion_is_accessible() {
            local code="${1#HTTP/* }"
            code="${code%% *}"
            case "${code}" in 2??|3??|401|403) return 0 ;; *) return 1 ;; esac
          }

          echo "⏳ Phase 1: waiting for Apache on port ${PORT} (TCP)..."
          deadline=$(( SECONDS + TIMEOUT ))
          while (( SECONDS < deadline )); do
            status="$(polarion_read_http_status 2>/dev/null || true)"
            if polarion_is_accessible "${status}"; then
              echo "  ✅ Apache is up (${status}) after ${SECONDS}s"
              break
            fi
            sleep "${POLL}"
          done

          # ── Phase 2: Playwright smoke login ─────────────────────────
          echo "⏳ Phase 2: waiting for successful Polarion login via Playwright (max ${TIMEOUT}s)..."
          node - <<'SMOKE_EOF'
          const { chromium } = require('./node_modules/playwright');

          const BASE_URL  = process.env.POLARION_URL  || 'http://localhost';
          const USER      = process.env.POLARION_USER || 'admin';
          const PASS      = process.env.POLARION_PASS || 'admin';
          const TIMEOUT   = 900_000; // 15 min total
          const POLL      = 5_000;

          (async () => {
            const browser = await chromium.launch({
              args: ['--no-sandbox', '--disable-setuid-sandbox', '--disable-dev-shm-usage'],
            });
            const page = await browser.newPage();
            const deadline = Date.now() + TIMEOUT;

            // Wait for the login form to appear
            console.log('  Waiting for login form...');
            let formVisible = false;
            while (Date.now() < deadline) {
              try {
                await page.goto(`${BASE_URL}/polarion`, { timeout: 30_000, waitUntil: 'domcontentloaded' });
                formVisible = await page.locator('input[name="j_username"]')
                  .isVisible({ timeout: 5_000 }).catch(() => false);
                if (formVisible) break;
              } catch (_) {}
              await new Promise(r => setTimeout(r, POLL));
            }

            if (!formVisible) {
              console.error('❌ Login form never appeared within timeout');
              await browser.close();
              process.exit(1);
            }

            // Log in
            console.log('  Login form visible – logging in...');
            await page.locator('input[name="j_username"]').fill(USER);
            await page.locator('input[name="j_password"]').fill(PASS);
            const submit = page.locator('input[type="submit"], button[type="submit"]').first();
            if (await submit.isVisible({ timeout: 3_000 }).catch(() => false)) {
              await submit.click();
            } else {
              await page.locator('input[name="j_password"]').press('Enter');
            }

            // Verify login succeeded: login form disappears
            const loggedIn = await page.waitForFunction(
              () => !document.querySelector('input[name="j_username"]'),
              { timeout: 30_000 }
            ).then(() => true).catch(() => false);

            if (!loggedIn) {
              console.error('❌ Login failed – still on login page');
              await browser.close();
              process.exit(1);
            }

            console.log(`✅ Polarion login succeeded – stack is fully ready (url: ${page.url()})`);
            await browser.close();
          })();
          SMOKE_EOF

      # ------------------------------------------------------------------
      # 7. Run Playwright tests
      # ------------------------------------------------------------------
      - name: Run Playwright UI tests
        working-directory: tests/ui
        env:
          POLARION_URL: "http://localhost"
          POLARION_USER: "admin"
          POLARION_PASS: "admin"
        run: npm run test:fast

      # ------------------------------------------------------------------
      # 8. Upload artefacts on failure
      # ------------------------------------------------------------------
      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: tests/ui/playwright-report/
          retention-days: 14

      # ------------------------------------------------------------------
      # 9. Dump Docker logs on failure for debugging
      # ------------------------------------------------------------------
      - name: Dump Polarion container logs on failure
        if: failure()
        run: docker logs polarion --tail 200
