# Spins up the Polarion Docker container, deploys the built plugin JAR,
# waits for Polarion to be healthy, and runs all Playwright UI tests.
#
# Prerequisites / Secrets:
#   PACKAGES_TOKEN – PAT with read:packages (same as used in ci.yml)
#   GITHUB_TOKEN   – automatically injected by GitHub Actions
#
# The Polarion image is pulled from:
#   ghcr.io/phillipboesger/polarion-docker:latest

name: UI Tests – Playwright

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

jobs:
  ui-tests:
    name: Playwright UI Tests (Polarion)
    runs-on: ubuntu-latest
    timeout-minutes: 55

    permissions:
      contents: read
      packages: read

    steps:
      # ------------------------------------------------------------------
      # 1. Source code
      # ------------------------------------------------------------------
      - name: Checkout
        uses: actions/checkout@v4

      # ------------------------------------------------------------------
      # 2. Build the plugin JAR (skip unit tests – handled by ci.yml)
      # ------------------------------------------------------------------
      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: temurin
          cache: maven
          server-id: github
          server-username: GITHUB_ACTOR
          server-password: PACKAGES_TOKEN

      - name: Build plugin JAR
        run: mvn --batch-mode package -DskipTests
        env:
          GITHUB_ACTOR: ${{ github.actor }}
          PACKAGES_TOKEN: ${{ secrets.PACKAGES_TOKEN || secrets.GITHUB_TOKEN }}

      # ------------------------------------------------------------------
      # 3. Pre-populate the Polarion extensions volume with the plugin JAR
      #    Deploy path: /opt/polarion/polarion/extensions/custom/eclipse/plugins/
      # ------------------------------------------------------------------
      - name: Create Polarion Docker volumes
        run: |
          docker volume create polarion_repo
          docker volume create polarion_extensions

      - name: Deploy plugin JAR into extensions volume
        run: |
          JAR_NAME=$(ls target/*.jar | head -1 | xargs basename)
          echo "Deploying: $JAR_NAME"
          docker run --rm \
            -v polarion_extensions:/ext \
            -v "$(pwd)/target:/src" \
            alpine sh -c "mkdir -p /ext/custom/eclipse/plugins && cp /src/${JAR_NAME} /ext/custom/eclipse/plugins/"

      # ------------------------------------------------------------------
      # 4. Start the Polarion container
      # ------------------------------------------------------------------
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.PACKAGES_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Pull Polarion image
        run: docker pull ghcr.io/phillipboesger/polarion-docker:latest

      - name: Start Polarion container
        run: |
          docker run -d \
            --name polarion \
            --platform linux/amd64 \
            --memory 6g \
            -p 80:80 \
            -p 5433:5433 \
            -p 5005:5005 \
            -e JAVA_OPTS="-Xmx5g -Xms2g" \
            -e JDWP_ENABLED=false \
            --volume polarion_repo:/opt/polarion/data/svn \
            --volume polarion_extensions:/opt/polarion/polarion/extensions \
            ghcr.io/phillipboesger/polarion-docker:latest

      # ------------------------------------------------------------------
      # 5. Wait for Polarion to be ready (up to 10 min)
      # ------------------------------------------------------------------
      - name: Wait for Polarion to become healthy
        run: |
          echo "⏳ Waiting for Polarion to respond on http://localhost/polarion/ ..."
          for i in $(seq 1 60); do
            HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" http://localhost/polarion/ || true)
            if [[ "$HTTP_CODE" == "200" || "$HTTP_CODE" == "302" || "$HTTP_CODE" == "301" ]]; then
              echo "✅ Polarion is up (HTTP $HTTP_CODE) after attempt $i"
              exit 0
            fi
            echo "  Attempt $i/60 – HTTP $HTTP_CODE, retrying in 10s…"
            sleep 10
          done
          echo "❌ Polarion did not become ready within 10 minutes"
          docker logs polarion --tail 100
          exit 1

      - name: Wait for Polarion login form
        run: |
          echo "⏳ Waiting for Polarion login form (up to 10 min) ..."
          for i in $(seq 1 60); do
            HTML=$(curl -sL http://localhost/polarion/ 2>/dev/null || true)
            if echo "$HTML" | grep -qiE 'j_username|j_password|name="j_password"'; then
              echo "✅ Login form is available after attempt $i"
              exit 0
            fi
            echo "  Attempt $i/60 – login form not ready, retrying in 10s..."
            sleep 10
          done
          echo "❌ Login form did not become ready in 10 minutes"
          docker logs polarion --tail 200
          exit 1

      # ------------------------------------------------------------------
      # 6. Install Node.js & Playwright
      # ------------------------------------------------------------------
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: tests/ui/package-lock.json

      - name: Install npm dependencies
        working-directory: tests/ui
        run: npm ci

      - name: Install Playwright Chromium browser
        working-directory: tests/ui
        run: npx playwright install chromium --with-deps

      # ------------------------------------------------------------------
      # 7. Run Playwright tests
      # ------------------------------------------------------------------
      - name: Run Playwright UI tests
        working-directory: tests/ui
        env:
          POLARION_URL: "http://localhost"
          POLARION_USER: "admin"
          POLARION_PASS: "admin"
        run: npm run test:fast

      # ------------------------------------------------------------------
      # 8. Upload artefacts on failure
      # ------------------------------------------------------------------
      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: tests/ui/playwright-report/
          retention-days: 14

      # ------------------------------------------------------------------
      # 9. Dump Docker logs on failure for debugging
      # ------------------------------------------------------------------
      - name: Dump Polarion container logs on failure
        if: failure()
        run: docker logs polarion --tail 200
