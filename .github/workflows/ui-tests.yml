# Spins up the Polarion Docker container, deploys the built plugin JAR,
# waits for Polarion to be healthy, and runs all Playwright UI tests.
#
# Prerequisites / Secrets:
#   PACKAGES_TOKEN – PAT with read:packages (same as used in ci.yml)
#   GITHUB_TOKEN   – automatically injected by GitHub Actions
#
# The Polarion image is pulled from:
#   ghcr.io/phillipboesger/polarion-docker:latest

name: UI Tests – Playwright

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

jobs:
  ui-tests:
    name: Playwright UI Tests (Polarion)
    runs-on: ubuntu-latest
    timeout-minutes: 55

    permissions:
      contents: read
      packages: read

    steps:
      # ------------------------------------------------------------------
      # 1. Source code
      # ------------------------------------------------------------------
      - name: Checkout
        uses: actions/checkout@v4

      # ------------------------------------------------------------------
      # 2. Build the plugin JAR (skip unit tests – handled by ci.yml)
      # ------------------------------------------------------------------
      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: temurin
          cache: maven
          server-id: github
          server-username: GITHUB_ACTOR
          server-password: PACKAGES_TOKEN

      - name: Build plugin JAR
        run: mvn --batch-mode package -DskipTests
        env:
          GITHUB_ACTOR: ${{ github.actor }}
          PACKAGES_TOKEN: ${{ secrets.PACKAGES_TOKEN || secrets.GITHUB_TOKEN }}

      # ------------------------------------------------------------------
      # 3. Pre-populate the Polarion extensions volume with the plugin JAR
      #    Deploy path: /opt/polarion/polarion/extensions/custom/eclipse/plugins/
      # ------------------------------------------------------------------
      - name: Create Polarion Docker volumes
        run: |
          docker volume create polarion_repo
          docker volume create polarion_extensions

      - name: Deploy plugin JAR into extensions volume
        run: |
          JAR_NAME=$(ls target/*.jar | head -1 | xargs basename)
          echo "Deploying: $JAR_NAME"
          docker run --rm \
            -v polarion_extensions:/ext \
            -v "$(pwd)/target:/src" \
            alpine sh -c "mkdir -p /ext/custom/eclipse/plugins && cp /src/${JAR_NAME} /ext/custom/eclipse/plugins/"

      # ------------------------------------------------------------------
      # 4. Start the Polarion container
      # ------------------------------------------------------------------
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.PACKAGES_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Pull Polarion image
        run: docker pull ghcr.io/phillipboesger/polarion-docker:latest

      - name: Start Polarion container
        run: |
          # GitHub Actions ubuntu-latest has ~7 GB RAM.
          # Reduce JVM heap so there is headroom for Chromium (~500 MB) and Node.js.
          # --shm-size=256m avoids /dev/shm exhaustion inside the container.
          docker run -d \
            --name polarion \
            --platform linux/amd64 \
            --memory 6g \
            --shm-size=256m \
            -p 80:80 \
            -p 5433:5433 \
            -p 5005:5005 \
            -e JAVA_OPTS="-Xmx3g -Xms1g" \
            -e JDWP_ENABLED=false \
            --volume polarion_repo:/opt/polarion/data/svn \
            --volume polarion_extensions:/opt/polarion/polarion/extensions \
            ghcr.io/phillipboesger/polarion-docker:latest

      # ------------------------------------------------------------------
      # 5. Wait for Polarion to be ready
      #
      # Two-phase readiness check:
      #
      # Phase 1 – TCP: raw /dev/tcp socket to confirm Apache is up.
      #   Fires quickly (~30-40 s on GitHub Actions ubuntu-latest).
      #   Based on polarion-runtime-lib.sh from the polarion-docker repo.
      #
      # Phase 2 – Plugin: poll /polarion/code-editor/editor.html until
      #   it responds with 2xx or 3xx (redirect to login = plugin active).
      #   This URL is registered by the plugin bundle via hivemodule.xml.
      #   It is ONLY served once the plugin's OSGi bundle is fully
      #   activated and the Polarion webapp is registered — making it the
      #   definitive readiness signal for "Polarion + plugin ready".
      #   On GitHub Actions ubuntu-latest this takes 10–13 min.
      #   Timeout: 900 s (15 min) to stay within the 55-min job limit.
      #
      # Note: curl is used WITHOUT -L to avoid the redirect-chain
      # http_code concatenation bug (e.g. "301200" instead of "200").
      # ------------------------------------------------------------------
      - name: Wait for Polarion to become ready
        run: |
          HOST=127.0.0.1
          PORT=80
          TIMEOUT=900
          POLL=5
          PLUGIN_URL="http://localhost/polarion/code-editor/editor.html"

          # ── Phase 1: TCP – wait for Apache ──────────────────────────
          polarion_read_http_status() {
            local st=""
            exec 3<>"/dev/tcp/${HOST}/${PORT}" 2>/dev/null || return 1
            printf 'GET /polarion/ HTTP/1.1\r\nHost: localhost\r\nConnection: close\r\n\r\n' >&3
            IFS=$'\r' read -r st <&3 || true
            exec 3<&- ; exec 3>&-
            [ -n "${st}" ] || return 1
            printf '%s\n' "${st}"
          }

          polarion_is_accessible() {
            local code="${1#HTTP/* }"
            code="${code%% *}"
            case "${code}" in 2??|3??|401|403) return 0 ;; *) return 1 ;; esac
          }

          echo "⏳ Phase 1: waiting for Apache on port ${PORT} (TCP)..."
          deadline=$(( SECONDS + TIMEOUT ))
          while (( SECONDS < deadline )); do
            status="$(polarion_read_http_status 2>/dev/null || true)"
            if polarion_is_accessible "${status}"; then
              echo "  ✅ Apache is up (${status}) after ${SECONDS}s"
              break
            fi
            sleep "${POLL}"
          done

          # ── Phase 2: Plugin – wait for plugin URL to respond ────────
          # /polarion/code-editor/editor.html is served by the plugin's
          # OSGi bundle. A 2xx/3xx response (including redirect to login)
          # means the bundle is fully active and the webapp is registered.
          # A 404 means Polarion is up but the plugin is not yet loaded.
          echo "⏳ Phase 2: waiting for plugin URL to respond (max ${TIMEOUT}s)..."
          deadline=$(( SECONDS + TIMEOUT ))
          while (( SECONDS < deadline )); do
            # No -L flag: get the raw first-response HTTP code
            CODE=$(curl -s -o /dev/null -w "%{http_code}" --max-time 10 "${PLUGIN_URL}" 2>/dev/null || true)
            case "${CODE}" in
              2??|3??|401|403)
                echo "✅ Plugin is active (HTTP ${CODE}) after ${SECONDS}s total"
                exit 0
                ;;
              404)
                # Polarion is up but plugin not yet registered – keep waiting
                ;;
            esac
            sleep "${POLL}"
          done

          echo "❌ Plugin did not become active within ${TIMEOUT}s"
          docker logs polarion --tail 200
          exit 1

      # ------------------------------------------------------------------
      # 6. Install Node.js & Playwright
      # ------------------------------------------------------------------
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: tests/ui/package-lock.json

      - name: Install npm dependencies
        working-directory: tests/ui
        run: npm ci

      - name: Install Playwright Chromium browser
        working-directory: tests/ui
        run: npx playwright install chromium --with-deps

      # ------------------------------------------------------------------
      # 7. Run Playwright tests
      # ------------------------------------------------------------------
      - name: Run Playwright UI tests
        working-directory: tests/ui
        env:
          POLARION_URL: "http://localhost"
          POLARION_USER: "admin"
          POLARION_PASS: "admin"
        run: npm run test:fast

      # ------------------------------------------------------------------
      # 8. Upload artefacts on failure
      # ------------------------------------------------------------------
      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: tests/ui/playwright-report/
          retention-days: 14

      # ------------------------------------------------------------------
      # 9. Dump Docker logs on failure for debugging
      # ------------------------------------------------------------------
      - name: Dump Polarion container logs on failure
        if: failure()
        run: docker logs polarion --tail 200
