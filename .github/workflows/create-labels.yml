# One-time setup: creates the three labels that the Release workflow uses to
# determine which part of the semantic version to bump.
#
# Run this once via:  Actions → Create Release Labels → Run workflow
#
# After running you will find these labels in Settings → Labels:
#   release:patch  (blue)   – bug fixes         → x.y.Z
#   release:minor  (yellow) – new features       → x.Y.0
#   release:major  (red)    – breaking changes   → X.0.0

name: Create Release Labels

on:
  workflow_dispatch:

jobs:
  labels:
    name: Create Labels
    runs-on: ubuntu-latest
    permissions:
      issues: write

    steps:
      - name: Create / update release labels
        run: |
          create_label() {
            local name="$1" description="$2" color="$3"
            gh label create "$name" \
              --description "$description" \
              --color "$color" \
              --repo "${{ github.repository }}" \
              --force
          }

          create_label "release:patch" \
            "Triggers a patch release (x.y.Z) – bug fixes" \
            "0075ca"

          create_label "release:minor" \
            "Triggers a minor release (x.Y.0) – new features" \
            "e4e669"

          create_label "release:major" \
            "Triggers a major release (X.0.0) – breaking changes" \
            "d73a4a"

          echo "✅  Labels created / updated successfully."
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
