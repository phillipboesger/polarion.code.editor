name: Feature Request
description: Suggest an idea or improvement
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Got an idea? Great! Please describe it as clearly as possible.

  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: Is your request related to a problem or limitation you're hitting?
      placeholder: "e.g. It's frustrating when I can't..."
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: Describe the feature or improvement you'd like to see.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Any workarounds or other approaches you've thought about?

  - type: textarea
    id: context
    attributes:
      label: Additional Context
      description: Anything else that might help — screenshots, links, examples.
